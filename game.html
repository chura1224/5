<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>엄데쏨 대탈출! | U-Deol-Sik Game</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="game.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="game-body">
    <nav class="nav">
        <a href="index.html" class="back-link">← 메인으로 돌아가기</a>
    </nav>

    <main class="game-container">
        <div class="game-header">
            <h1>하과장의 엄데쏨 대탈출!</h1>
            <p>승진턱 영수증을 피하고 골프채와 로또를 챙기세요!</p>
        </div>

        <div class="game-ui">
            <div class="score-board">SCORE: <span id="score">0</span></div>
            <div id="game-status">READY?</div>
        </div>

        <div id="game-area">
            <canvas id="game-canvas" width="800" height="600"></canvas>
            <div id="game-over-overlay" class="hidden">
                <h2>GAME OVER</h2>
                <p id="final-score-text">최종 점수: 0</p>
                <p id="funny-comment"></p>
                <button id="restart-btn" class="btn primary">다시 도전!</button>
            </div>
        </div>

        <div class="game-controls">
            <p>마우스나 터치로 하과장을 이동시키세요!</p>
        </div>
    </main>

    <script src="game.js"></script>
</body>
</html>
