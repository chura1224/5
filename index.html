<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monkey Fighter | 원숭이 대전 격투</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="ui-overlay">
            <div class="health-container">
                <div class="health-bar-bg"><div id="p1-health" class="health-bar"></div></div>
                <div class="character-name">MONKEY 1</div>
            </div>
            <div id="timer">99</div>
            <div class="health-container">
                <div class="health-bar-bg"><div id="p2-health" class="health-bar"></div></div>
                <div class="character-name">MONKEY 2</div>
            </div>
        </div>
        <canvas id="game-canvas"></canvas>
        <div id="message-overlay" class="hidden">
            <h1 id="victory-text">K.O.</h1>
            <button id="restart-btn">REMATCH</button>
        </div>
        <div id="controls-hint">
            <p>P1: WASD (Move/Jump), G (Punch), H (Kick)</p>
            <p>P2: Arrows (Move/Jump), Num 1 (Punch), Num 2 (Kick)</p>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
