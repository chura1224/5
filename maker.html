<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우덜식 빌런 제조기 | Wanted Poster Maker</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="maker.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="maker-body">
    <nav class="nav">
        <a href="index.html" class="back-link">← 메인으로 돌아가기</a>
    </nav>

    <main class="maker-container">
        <header class="maker-header">
            <h1>빌런 제조기</h1>
            <p>친구의 사진을 올리고 수배지를 만들어보세요!</p>
        </header>

        <div class="maker-layout">
            <section class="form-section">
                <form id="poster-form">
                    <div class="input-group">
                        <label for="name">이름 (Name)</label>
                        <input type="text" id="name" placeholder="예: 개두호" required>
                    </div>
                    <div class="input-group">
                        <label for="alias">별명 (Alias)</label>
                        <input type="text" id="alias" placeholder="예: 전설의 로또 백수">
                    </div>
                    <div class="input-group">
                        <label for="story">죄목 (Story)</label>
                        <textarea id="story" placeholder="범죄 사실을 적나라하게 적어보세요..."></textarea>
                    </div>
                    <div class="input-group">
                        <label for="bounty">현상금 (Bounty)</label>
                        <input type="text" id="bounty" placeholder="예: ₩500,000,000">
                    </div>
                    <div class="input-group">
                        <label for="photo">사진 올리기 (Photo)</label>
                        <input type="file" id="photo" accept="image/*" required>
                    </div>
                    <button type="button" id="generate-btn" class="btn primary">수배지 생성</button>
                </form>
            </section>

            <section class="preview-section">
                <h3>미리보기</h3>
                <div id="poster-preview">
                    <canvas id="poster-canvas" width="600" height="800"></canvas>
                </div>
                <button type="button" id="download-btn" class="btn secondary" disabled>이미지로 저장하기</button>
            </section>
        </div>
    </main>

    <script src="maker.js"></script>
</body>
</html>
